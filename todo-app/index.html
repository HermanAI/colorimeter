<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App - Local Storage</title>
    <link rel="stylesheet" href="css/todo.css">
</head>
<body>
    <div class="container">
        <div class="todo-wrapper">
            <header class="todo-header">
                <h1>📝 My Tasks</h1>
                <p class="subtitle">Stay organized with local storage</p>
            </header>

            <div class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="todo-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="btn-add">Add</button>
                </div>
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
            </div>

            <div class="stats">
                <span>Total: <strong id="totalCount">0</strong></span>
                <span>Active: <strong id="activeCount">0</strong></span>
                <span>Completed: <strong id="completedCount">0</strong></span>
            </div>

            <div class="todo-list-container">
                <ul id="todoList" class="todo-list"></ul>
                <div id="emptyState" class="empty-state">
                    <p>✨ No tasks yet. Add one to get started!</p>
                </div>
            </div>

            <div class="actions">
                <button id="clearCompleted" class="btn-secondary">Clear Completed</button>
                <button id="deleteAll" class="btn-danger">Delete All</button>
            </div>
        </div>
    </div>

    <script src="js/todo.js"></script>
</body>
</html>
